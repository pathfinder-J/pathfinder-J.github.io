<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <title>{{ page.title }} | {{ site.title }}</title>

  <!-- Noto Sans KR -->
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap" />

  <!-- Site CSS -->
  <link rel="stylesheet" href="/css/style.css" />

  <!-- MathJax (LaTeX) -->
  <script defer src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
  <script defer>
    document.addEventListener('DOMContentLoaded', () => {
      document.querySelectorAll('pre > code[class^="language-"]').forEach((code) => {
        const lang = code.className.match(/language-([a-z0-9_-]+)/i)?.[1];
        if (!lang) return;

        const pre = code.parentElement;
        if (!pre || pre.querySelector('.code-lang')) return;

        const tag = document.createElement('div');
        tag.className = 'code-lang';
        tag.textContent = lang;

        pre.style.position = 'relative';
        pre.prepend(tag);
      });
    });
  </script>
</head>

<script>
document.addEventListener("DOMContentLoaded", function () {
  const COLLAPSED_HEIGHT = 220; // CSS max-height와 맞추면 됨

  document.querySelectorAll(".highlighter-rouge .highlight").forEach(function(block){
    const contentHeight = block.scrollHeight;

    // 짧은 코드면 버튼 필요 없음
    if (contentHeight <= COLLAPSED_HEIGHT + 20) {
      block.classList.add("is-short");
      return;
    }

    // 기본은 접힌 상태
    block.classList.add("is-collapsed");

    const button = document.createElement("button");
    button.className = "code-toggle-btn";
    button.type = "button";
    button.textContent = "Expand";

    button.addEventListener("click", function () {
      const collapsed = block.classList.contains("is-collapsed");

      if (collapsed) {
        block.classList.remove("is-collapsed");
        button.textContent = "Collapse";
      } else {
        block.classList.add("is-collapsed");
        button.textContent = "Expand";
      }
    });

    block.appendChild(button);
  });
});
</script>
  
<body>
  <header class="site-header">
    <div class="site-title">
      <a href="/">{{ site.title }}</a>
    </div>
  </header>

  <main class="container">
    <article class="post">
      {% unless page.url == "/" %}
        <h1 class="post-title">{{ page.title }}</h1>
      {% endunless %}

      {% if page.date %}
        <div class="post-meta">{{ page.date | date: "%Y-%m-%d" }}</div>
      {% endif %}

      <div class="post-content">
        {{ content }}
      </div>
    </article>
  </main>

  <footer class="site-footer">
    <small>© {{ site.title }}</small>
  </footer>
</body>

<script>
document.addEventListener("DOMContentLoaded", function () {

  document.querySelectorAll(".highlighter-rouge .highlight").forEach(function(block){

    const button = document.createElement("button");
    button.className = "code-copy-btn";
    button.textContent = "Copy";

    block.appendChild(button);

    button.addEventListener("click", function(){

      const code = block.querySelector(".rouge-code pre");

      if(!code) return;

      const text = code.innerText;

      navigator.clipboard.writeText(text).then(() => {

        button.textContent = "Copied";
        button.classList.add("copied");

        setTimeout(() => {
          button.textContent = "Copy";
          button.classList.remove("copied");
        },1500);

      });

    });

  });

});
</script>

</html>
