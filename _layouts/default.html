<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <title>{{ page.title }} | {{ site.title }}</title>

  <!-- Noto Sans KR -->
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap" />

  <!-- Site CSS -->
  <link rel="stylesheet" href="/css/style.css" />

  <!-- MathJax (LaTeX) -->
  <script defer src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
</head>

<body>
  <header class="site-header">
    <div class="site-title">
      <a href="/">{{ site.title }}</a>
    </div>
  </header>

  <main class="container">
    <article class="post">
      {% unless page.url == "/" %}
        <h1 class="post-title">{{ page.title }}</h1>
      {% endunless %}

      {% if page.date %}
        <div class="post-meta">{{ page.date | date: "%Y-%m-%d" }}</div>
      {% endif %}

      <div class="post-content">
        {{ content }}
      </div>
    </article>
  </main>

  <footer class="site-footer">
    <small>© {{ site.title }}</small>
  </footer>

  <script>
    document.addEventListener("DOMContentLoaded", function () {
      const COLLAPSED_HEIGHT = 220;

      // ✅ 바깥 div.highlight만 (pre.highlight 제외)
      document.querySelectorAll(".highlighter-rouge > .highlight").forEach(function (block) {

        // ----- Copy 버튼: 항상 1개만 생성 -----
        if (!block.querySelector(".code-copy-btn")) {
          const copyBtn = document.createElement("button");
          copyBtn.className = "code-copy-btn";
          copyBtn.type = "button";
          copyBtn.textContent = "Copy";

          copyBtn.addEventListener("click", function () {
            const code = block.querySelector(".rouge-code pre");
            if (!code) return;

            const text = code.innerText;

            navigator.clipboard.writeText(text).then(() => {
              copyBtn.textContent = "Copied";
              copyBtn.classList.add("copied");

              setTimeout(() => {
                copyBtn.textContent = "Copy";
                copyBtn.classList.remove("copied");
              }, 1200);
            });
          });

          block.appendChild(copyBtn);
        }

        // ----- Expand/Collapse: 높이 측정 안정화 -----
        requestAnimationFrame(() => {
          const contentHeight = block.scrollHeight;

          // 짧은 코드면 Expand 숨김 처리
          if (contentHeight <= COLLAPSED_HEIGHT + 20) {
            block.classList.add("is-short");
            block.classList.remove("is-collapsed");

            // 혹시 이전에 남아있던 Expand 버튼이 있으면 제거
            const existingToggle = block.querySelector(".code-toggle-btn");
            if (existingToggle) existingToggle.remove();
            return;
          }

          // 긴 코드면 기본 접힘
          block.classList.remove("is-short");
          block.classList.add("is-collapsed");

          // Expand 버튼은 1개만 생성
          if (!block.querySelector(".code-toggle-btn")) {
            const toggleBtn = document.createElement("button");
            toggleBtn.className = "code-toggle-btn";
            toggleBtn.type = "button";
            toggleBtn.textContent = "Expand";

            toggleBtn.addEventListener("click", function () {
              const collapsed = block.classList.contains("is-collapsed");

              if (collapsed) {
                block.classList.remove("is-collapsed");
                toggleBtn.textContent = "Collapse";
              } else {
                block.classList.add("is-collapsed");
                toggleBtn.textContent = "Expand";
              }
            });

            block.appendChild(toggleBtn);
          }
        });
      });
    });
  </script>
</body>
</html>
