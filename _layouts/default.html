<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <title>{{ page.title }} | {{ site.title }}</title>

  <!-- Noto Sans KR -->
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap" />

  <!-- Site CSS -->
  <link rel="stylesheet" href="/css/style.css" />

  <!-- MathJax (LaTeX) -->
  <script defer src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
</head>

<body>
  <header class="site-header">
    <div class="site-title">
      <a href="/">{{ site.title }}</a>
    </div>
  </header>

  <main class="container">
    <article class="post">
      {% unless page.url == "/" %}
        <h1 class="post-title">{{ page.title }}</h1>
      {% endunless %}

      {% if page.date %}
        <div class="post-meta">{{ page.date | date: "%Y-%m-%d" }}</div>
      {% endif %}

      <div class="post-content">
        {{ content }}
      </div>
    </article>
  </main>

  <footer class="site-footer">
    <small>© {{ site.title }}</small>
  </footer>

 <script>
 document.addEventListener("DOMContentLoaded", function () {
  const COLLAPSED_HEIGHT = 220;

  document.querySelectorAll(".highlighter-rouge > .highlight").forEach(function (block) {

    // --- toolbar (한 번만 생성) ---
    let toolbar = block.querySelector(".code-toolbar");
    if (!toolbar) {
      toolbar = document.createElement("div");
      toolbar.className = "code-toolbar";
      block.appendChild(toolbar);
    }

    // --- Copy 버튼 (항상) ---
    let copyBtn = toolbar.querySelector(".code-copy-btn");
    if (!copyBtn) {
      copyBtn = document.createElement("button");
      copyBtn.className = "code-copy-btn";
      copyBtn.type = "button";
      copyBtn.textContent = "Copy";

      copyBtn.addEventListener("click", function () {
        const code = block.querySelector(".rouge-code pre");
        if (!code) return;

        navigator.clipboard.writeText(code.innerText).then(() => {
          copyBtn.textContent = "Copied";
          copyBtn.classList.add("copied");
          setTimeout(() => {
            copyBtn.textContent = "Copy";
            copyBtn.classList.remove("copied");
          }, 1200);
        });
      });

      toolbar.appendChild(copyBtn);
    }

    // --- Expand 버튼 (길 때만) ---
    requestAnimationFrame(() => {
      const contentHeight = block.scrollHeight;

      let toggleBtn = toolbar.querySelector(".code-toggle-btn");

      // 짧은 코드: Expand 제거(있으면) + Copy만 남김
      if (contentHeight <= COLLAPSED_HEIGHT + 20) {
        block.classList.add("is-short");
        block.classList.remove("is-collapsed");
        if (toggleBtn) toggleBtn.remove();
        return;
      }

      // 긴 코드: 접힘 + Expand 생성
      block.classList.remove("is-short");
      block.classList.add("is-collapsed");

      if (!toggleBtn) {
        toggleBtn = document.createElement("button");
        toggleBtn.className = "code-toggle-btn";
        toggleBtn.type = "button";
        toggleBtn.textContent = "Expand";

        toggleBtn.addEventListener("click", function () {
          const collapsed = block.classList.contains("is-collapsed");
          if (collapsed) {
            block.classList.remove("is-collapsed");
            toggleBtn.textContent = "Collapse";
          } else {
            block.classList.add("is-collapsed");
            toggleBtn.textContent = "Expand";
          }
        });

        // ✅ Expand를 Copy의 왼쪽에 두기
        toolbar.insertBefore(toggleBtn, copyBtn);
      }
    });
  });
});
</script>
</body>
</html>
